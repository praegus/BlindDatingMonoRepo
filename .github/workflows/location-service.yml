name: location service CI

on:
  push:
    branches: [ "open-url-test" ]

#
#on:
#  push:
#    paths:
#      - 'location-service/**'
#      - '.github/workflows/location-service.yml'
#    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build and containerize with Jib
        working-directory: ./location-service
        run: mvn clean compile jib:build

      - name: Deploy location to CapRover
        uses: caprover/deploy-from-github@v1.1.2
        with:
          server: ${{ secrets.CAPROVER_SERVER }}
          app: location-service
          token: ${{ secrets.CAPROVER_LOCATION_TOKEN }}
          image: docker.io/finkingma/location-service
