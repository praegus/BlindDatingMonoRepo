name: matching service CI

on:
  push:
    paths:
      - 'matching-service/**'
      - '.github/workflows/matching-service.yml'
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build and containerize with Jib
        working-directory: ./matching-service
        run: mvn clean compile jib:build

      - name: Deploy matching to CapRover
        uses: caprover/deploy-from-github@v1.1.2
        with:
          server: ${{ secrets.CAPROVER_SERVER }}
          app: matching-service
          token: ${{ secrets.CAPROVER_MATCHING_TOKEN }}
          image: docker.io/finkingma/matching-service:latest
