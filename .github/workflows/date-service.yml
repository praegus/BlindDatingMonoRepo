name: date service CI

on:
  push:
    paths:
      - 'date-service/**'
      - '.github/workflows/date-service.yml'
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Build and containerize with Jib
        working-directory: ./date-service
        run: mvn clean compile jib:build

      - name: Deploy date to CapRover
        uses: caprover/deploy-from-github@v1.1.2
        with:
          server: ${{ secrets.CAPROVER_SERVER }}
          app: date-service
          token: ${{ secrets.CAPROVER_DATE_TOKEN }}
          image: docker.io/finkingma/date-service:latest
