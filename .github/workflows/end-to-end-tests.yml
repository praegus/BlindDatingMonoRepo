name: end to end tests

on:
  workflow_run:
    workflows:
      - blinddatingapp frontend CI
      - date service CI
      - location service CI
      - matching service CI
      - profile service CI
      - websocket service CI
    types:
      - completed

concurrency:
  group: end-to-end-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

jobs:
  evaluate-upstream-runs:
    if: >
      github.event.workflow_run.event == 'push' &&
      (
        github.event.workflow_run.head_branch == 'main' ||
        github.event.workflow_run.head_branch == 'open-url-test'
      )
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      should-run: ${{ steps.evaluate.outputs.should-run }}
    steps:
      - name: Evaluate relevant workflow runs for this commit
        id: evaluate
        uses: actions/github-script@v7
        with:
          script: |
            const relevantWorkflows = new Set([
              'blinddatingapp frontend CI',
              'date service CI',
              'location service CI',
              'matching service CI',
              'profile service CI',
              'websocket service CI',
            ]);

            const triggerRun = context.payload.workflow_run;
            const workflowName = triggerRun?.name;
            const headSha = triggerRun?.head_sha;

            if (!workflowName || !relevantWorkflows.has(workflowName)) {
              core.info(`Triggered by an unsupported workflow: ${workflowName ?? 'unknown'}. Skipping E2E.`);
              core.setOutput('should-run', 'false');
              return;
            }

            if (triggerRun.status !== 'completed') {
              core.info(`Trigger workflow ${workflowName} is still ${triggerRun.status}. Skipping E2E.`);
              core.setOutput('should-run', 'false');
              return;
            }

            if (triggerRun.conclusion !== 'success') {
              core.info(`Not running E2E because ${workflowName} finished with ${triggerRun.conclusion}.`);
              core.setOutput('should-run', 'false');
              return;
            }

            core.info(`Running E2E after successful completion of ${workflowName} for ${headSha}.`);
            core.setOutput('should-run', 'true');

  run-e2e:
    needs: evaluate-upstream-runs
    if: needs.evaluate-upstream-runs.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: playwright.ts/package-lock.json

      - name: Install dependencies
        working-directory: playwright.ts
        run: npm ci

      - name: Install Playwright browsers
        working-directory: playwright.ts
        run: npx playwright install --with-deps

      - name: Run E2E tests
        working-directory: playwright.ts
        run: npx playwright test
