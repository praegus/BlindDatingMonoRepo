name: end to end tests

on:
  push:
    branches:
      - main
      - open-url-test
  pull_request:

jobs:
  wait-for-services:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.wait.outputs.ready }}
    steps:
      - name: Wait for all service workflows that were triggered
        id: wait
        uses: lewagon/wait-on-check-action@v1.3.1
        with:
          ref: ${{ github.sha }}
          # Dit zijn ALLE service workflows in je mono repo
          checks: |
            blinddatingapp frontend CI
            date service CI
            location service CI
            matching service CI
            profile service CI
            websocket service CI
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10

  run-e2e:
    needs: wait-for-services
    if: needs.wait-for-services.outputs.ready == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run E2E tests
        run: |
          echo "Running E2E tests..."
          cd playwright.ts
          npm install
          npx playwright install
          npx playwright test