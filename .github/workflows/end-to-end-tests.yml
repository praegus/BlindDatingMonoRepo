name: end to end tests

on:
  workflow_run:
    workflows:
      - blinddatingapp frontend CI
      - date service CI
      - location service CI
      - matching service CI
      - profile service CI
      - websocket service CI
    types:
      - completed

concurrency:
  group: end-to-end-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

jobs:
  run-e2e:
    if: >
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.conclusion == 'success' &&
      (
        github.event.workflow_run.head_branch == 'main' ||
        github.event.workflow_run.head_branch == 'open-url-test'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: playwright.ts/package-lock.json

      - name: Install dependencies
        working-directory: playwright.ts
        run: npm ci

      - name: Install Playwright browsers
        working-directory: playwright.ts
        run: npx playwright install --with-deps

      - name: Run E2E tests
        working-directory: playwright.ts
        run: npx playwright test
