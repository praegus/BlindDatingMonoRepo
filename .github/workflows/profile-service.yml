name: profile service CI

on:
  pull_request:
    paths:
      - 'profile-service/**'
      - '.github/workflows/profile-service.yml'
  push:
    branches: [ "main" ]
    paths:
      - 'profile-service/**'
      - '.github/workflows/profile-service.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Run profile service tests
        working-directory: ./profile-service
        run: ./mvnw test

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Build and containerize with Jib
        working-directory: ./profile-service
        run: ./mvnw compile jib:build -DskipTests

      - name: Deploy profile to CapRover
        uses: caprover/deploy-from-github@v1.1.2
        with:
          server: ${{ secrets.CAPROVER_SERVER }}
          app: profile-service
          token: ${{ secrets.CAPROVER_PROFILE_TOKEN }}
          image: docker.io/finkingma/profile-service:latest
