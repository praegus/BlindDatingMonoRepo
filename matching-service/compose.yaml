services:
  matching-service-profile:
    image: docker.io/finkingma/profile-service
    container_name: matching-service-profile-service
    ports:
      - "9080:9080"
    environment:
      spring.kafka.bootstrap-servers: kafka:29092
      spring.kafka.properties.schema.registry.url: http://schema-registry:8081/apis/ccompat/v7
      spring.datasource.url: jdbc:postgresql://postgres:5432/postgres?useSSL=false
      endpoints.locationservice: http://location:9084
    restart: always
    depends_on:
      matching-service-postgres:
        condition: service_started
      matching-service-kafka:
        condition: service_healthy

  matching-service-kafka:
    image: bitnamilegacy/kafka:latest
    container_name: matching-service-kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_KRAFT_CLUSTER_ID: kraft-cluster
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:29092,CONTROLLER://:9093,EXTERNAL://:9092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      ALLOW_PLAINTEXT_LISTENER: yes
    networks:
      default:
        aliases:
          - kafka
    healthcheck:
      test: [ "CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:29092 --list || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  matching-service-schema-registry:
    image: apicurio/apicurio-registry:latest
    container_name: matching-service-schema-registry
    hostname: schema-registry
    ports:
      - "8081:8081"
    environment:
      REGISTRY_LOG_LEVEL: INFO
      REGISTRY_UI_FEATURES_READONLY: false
      REGISTRY_STORAGE: mem
      QUARKUS_HTTP_PORT: 8081
      REGISTRY_COMPATIBILITY_CONFLUENT: true
      REGISTRY_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    networks:
      default:
        aliases:
          - schema-registry
    depends_on:
      matching-service-kafka:
        condition: service_healthy

  matching-service-postgres:
    image: postgres
    hostname: postgres
    ports:
      - 5432:5432
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: example
    networks:
      default:
        aliases:
          - postgres
