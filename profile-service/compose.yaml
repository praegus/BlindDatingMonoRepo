services:
  profile-service-kafka:
    image: bitnamilegacy/kafka:latest
    container_name: profile-service-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_KRAFT_CLUSTER_ID: kraft-cluster
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      ALLOW_PLAINTEXT_LISTENER: yes
    healthcheck:
      test: [ "CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  profile-service-schema-registry:
    image: apicurio/apicurio-registry:latest
    container_name: profile-service-schema-registry
    ports:
      - "8081:8081"
    environment:
      REGISTRY_LOG_LEVEL: INFO
      REGISTRY_UI_FEATURES_READONLY: false
      REGISTRY_STORAGE: mem
      QUARKUS_HTTP_PORT: 8081
      REGISTRY_COMPATIBILITY_CONFLUENT: true
      REGISTRY_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      profile-service-kafka:
        condition: service_healthy

  profile-service-postgres:
    image: postgres
    ports:
      - 5432:5432
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: example
