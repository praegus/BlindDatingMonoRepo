services:
  date-service-kafka:
    image: bitnamilegacy/kafka:latest
    container_name: date-service-kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_KRAFT_CLUSTER_ID: kraft-cluster
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:29092,CONTROLLER://:9093,EXTERNAL://:9092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      ALLOW_PLAINTEXT_LISTENER: yes
    networks:
      default:
        aliases:
          - kafka
    healthcheck:
      test: [ "CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:29092 --list || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  date-service-schema-registry:
    image: apicurio/apicurio-registry:latest
    container_name: date-service-schema-registry
    hostname: schema-registry
    ports:
      - "8081:8081"
    environment:
      REGISTRY_LOG_LEVEL: INFO
      REGISTRY_UI_FEATURES_READONLY: false
      REGISTRY_STORAGE: mem
      QUARKUS_HTTP_PORT: 8081
      REGISTRY_COMPATIBILITY_CONFLUENT: true
      REGISTRY_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    networks:
      default:
        aliases:
          - schema-registry
    depends_on:
      date-service-kafka:
        condition: service_healthy
